name: VisionBrain CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python linting + tests ──────────────────────────────────────────
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest numpy scipy scikit-learn
          pip install -r cloud/requirements.txt || true
          pip install -r edge/requirements.txt || true

      - name: Run tests
        run: pytest tests/ -v --tb=short -x
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/cloud

      - name: Python lint (ruff)
        run: |
          pip install ruff
          ruff check cloud/ edge/ shared/ --select=E,F,W --ignore=E501

  # ── Dashboard type-check + build ────────────────────────────────────
  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: TypeScript check
        run: npx tsc --noEmit || true

      - name: Build
        run: npm run build

  # ── Go build ────────────────────────────────────────────────────────
  go-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloud/event_processor
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: cloud/event_processor/go.sum

      - name: Build
        run: go build -v ./...

      - name: Vet
        run: go vet ./...

  # ── Docker builds ───────────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [python-tests, dashboard, go-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build edge image
        run: docker build -t visionbrain-edge:${{ github.sha }} -f edge/Dockerfile .

      - name: Build cloud image
        run: docker build -t visionbrain-cloud:${{ github.sha }} -f cloud/Dockerfile .
