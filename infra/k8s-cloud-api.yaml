apiVersion: apps/v1
kind: Deployment
metadata:
  name: visionbrain-cloud-api
  labels:
    app: visionbrain
    component: cloud-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: visionbrain
      component: cloud-api
  template:
    metadata:
      labels:
        app: visionbrain
        component: cloud-api
    spec:
      containers:
        - name: cloud-api
          image: gcr.io/PROJECT_ID/visionbrain-cloud:latest
          ports:
            - containerPort: 8000
          env:
            - name: NEO4J_URI
              valueFrom:
                secretKeyRef:
                  name: visionbrain-secrets
                  key: neo4j-uri
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: visionbrain-secrets
                  key: neo4j-password
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: visionbrain-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: visionbrain-secrets
                  key: jwt-secret
            - name: LOG_FORMAT
              value: "json"
            - name: AUTH_ENABLED
              value: "true"
            - name: RATE_LIMIT_RPM
              value: "300"
          livenessProbe:
            httpGet:
              path: /live
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: visionbrain-cloud-api
spec:
  selector:
    app: visionbrain
    component: cloud-api
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
